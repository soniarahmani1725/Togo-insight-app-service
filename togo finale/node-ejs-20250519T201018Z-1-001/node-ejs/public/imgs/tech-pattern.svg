<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="circuitPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Circuit lines -->
      <path d="M10,10 L40,10 L40,40 L70,40 L70,10 L90,10" stroke="#4cc9f0" stroke-width="1" fill="none" opacity="0.3"/>
      <path d="M10,90 L30,90 L30,60 L60,60 L60,90 L90,90" stroke="#4cc9f0" stroke-width="1" fill="none" opacity="0.3"/>
      <path d="M10,50 L90,50" stroke="#4cc9f0" stroke-width="1" fill="none" opacity="0.2"/>
      <path d="M50,10 L50,90" stroke="#4cc9f0" stroke-width="1" fill="none" opacity="0.2"/>
      
      <!-- Connection points -->
      <circle cx="10" cy="10" r="3" fill="#00a6fb" opacity="0.5"/>
      <circle cx="40" cy="40" r="3" fill="#00a6fb" opacity="0.5"/>
      <circle cx="70" cy="10" r="3" fill="#00a6fb" opacity="0.5"/>
      <circle cx="10" cy="90" r="3" fill="#00a6fb" opacity="0.5"/>
      <circle cx="30" cy="60" r="3" fill="#00a6fb" opacity="0.5"/>
      <circle cx="60" cy="90" r="3" fill="#00a6fb" opacity="0.5"/>
      <circle cx="50" cy="50" r="4" fill="#00a6fb" opacity="0.5"/>
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#circuitPattern)"/>
</svg> 