<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mapGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2647" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#144272" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#mapGradient)"/>
  
  <!-- Simplified World Map Paths -->
  <g stroke="#4cc9f0" stroke-width="1" fill="none" opacity="0.2">
    <!-- North America -->
    <path d="M150,120 C200,110 250,130 300,120 C350,110 370,90 390,80 C410,70 430,90 450,100 C470,110 490,100 510,110 C530,120 550,140 520,160 C490,180 470,200 450,220 C430,240 410,230 390,240 C370,250 350,270 330,260 C310,250 290,240 270,250 C250,260 230,250 210,240 C190,230 170,220 150,230 C130,240 150,260 130,250 C110,240 90,230 110,210 C130,190 150,170 130,150 C110,130 130,140 150,120 Z"/>
    
    <!-- South America -->
    <path d="M250,280 C270,290 290,300 310,290 C330,280 350,300 370,310 C390,320 370,340 350,350 C330,360 310,380 290,390 C270,400 250,420 230,410 C210,400 190,380 210,360 C230,340 250,320 230,300 C210,280 230,270 250,280 Z"/>
    
    <!-- Europe -->
    <path d="M550,120 C570,110 590,100 610,110 C630,120 650,110 670,100 C690,90 710,100 690,120 C670,140 650,160 630,150 C610,140 590,160 570,150 C550,140 530,130 550,120 Z"/>
    
    <!-- Africa -->
    <path d="M550,200 C570,190 590,180 610,190 C630,200 650,220 670,230 C690,240 670,260 650,270 C630,280 610,300 590,310 C570,320 550,340 530,330 C510,320 530,300 510,290 C490,280 510,260 530,250 C550,240 530,210 550,200 Z"/>
    
    <!-- Asia -->
    <path d="M690,120 C710,110 730,100 750,110 C770,120 790,100 810,110 C830,120 850,140 870,130 C890,120 910,110 930,120 C950,130 970,150 950,170 C930,190 910,210 890,200 C870,190 850,210 830,220 C810,230 790,210 770,220 C750,230 730,250 710,240 C690,230 670,210 690,190 C710,170 730,150 690,120 Z"/>
    
    <!-- Australia -->
    <path d="M870,320 C890,310 910,300 930,310 C950,320 970,340 950,360 C930,380 910,360 890,370 C870,380 850,360 870,340 C890,320 850,330 870,320 Z"/>
    
    <!-- Connection lines between continents -->
    <path d="M150,120 L550,120" stroke-dasharray="5,5"/>
    <path d="M250,280 L550,200" stroke-dasharray="5,5"/>
    <path d="M550,120 L690,120" stroke-dasharray="5,5"/>
    <path d="M690,190 L870,320" stroke-dasharray="5,5"/>
    <path d="M550,200 L690,190" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Data nodes -->
  <g fill="#00a6fb" opacity="0.7">
    <circle cx="150" cy="120" r="5"/>
    <circle cx="550" cy="120" r="5"/>
    <circle cx="690" cy="120" r="5"/>
    <circle cx="250" cy="280" r="5"/>
    <circle cx="550" cy="200" r="5"/>
    <circle cx="690" cy="190" r="5"/>
    <circle cx="870" cy="320" r="5"/>
  </g>
</svg> 